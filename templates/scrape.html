<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrape — SMF Archiver</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme tokens ─────────────────────────────────────────── */
:root {
  --bg: #07091a;
  --surface: rgba(255,255,255,0.052);
  --surface2: rgba(255,255,255,0.032);
  --border: rgba(255,255,255,0.09);
  --hi: rgba(255,255,255,0.07);
  --accent: #818cf8; --accent2: #6366f1;
  --teal: #2dd4bf;
  --text: #dde2f8; --sub: #9da8cc; --muted: #4e5878;
  --ok: #34d399; --warn: #fbbf24; --danger: #f87171;
  --r: 14px;
  --blur: blur(22px) saturate(165%);
  --card-shadow: 0 8px 32px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.07);
  --b-purple-bg:rgba(99,102,241,0.14);  --b-purple-fg:#a5b4fc;
  --b-teal-bg:rgba(20,184,166,0.14);    --b-teal-fg:#5eead4;
  --b-blue-bg:rgba(59,130,246,0.14);    --b-blue-fg:#93c5fd;
  --b-red-bg:rgba(239,68,68,0.14);      --b-red-fg:#fca5a5;
  --b-yellow-bg:rgba(245,158,11,0.14);  --b-yellow-fg:#fde68a;
  --b-gray-bg:rgba(255,255,255,0.06);   --b-gray-fg:var(--muted);
  color-scheme: dark;
}
[data-theme="light"] {
  --bg: #eaedff;
  --surface: rgba(255,255,255,0.65);
  --surface2: rgba(255,255,255,0.45);
  --border: rgba(120,135,220,0.28);
  --hi: rgba(255,255,255,0.9);
  --accent: #4f46e5; --accent2: #6366f1;
  --teal: #0d9488;
  --text: #181c38; --sub: #363c62; --muted: #6e7ca0;
  --ok: #059669; --warn: #b45309; --danger: #dc2626;
  --card-shadow: 0 8px 32px rgba(70,85,200,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
  --b-purple-bg:rgba(79,70,229,0.11);  --b-purple-fg:#3730a3;
  --b-teal-bg:rgba(13,148,136,0.11);   --b-teal-fg:#115e59;
  --b-blue-bg:rgba(29,78,216,0.11);    --b-blue-fg:#1e3a8a;
  --b-red-bg:rgba(185,28,28,0.11);     --b-red-fg:#991b1b;
  --b-yellow-bg:rgba(146,64,14,0.11);  --b-yellow-fg:#78350f;
  --b-gray-bg:rgba(0,0,0,0.07);        --b-gray-fg:var(--muted);
  color-scheme: light;
}

/* ── Base ─────────────────────────────────────────────────── */
body {
  font-family: 'Sora', system-ui, sans-serif;
  min-height: 100vh;
  color: var(--text);
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 65% 55% at 10% 15%, rgba(99,102,241,0.20) 0%, transparent 100%),
    radial-gradient(ellipse 55% 50% at 88% 82%, rgba(45,212,191,0.13) 0%, transparent 100%),
    radial-gradient(ellipse 45% 40% at 62% 4%,  rgba(168,85,247,0.11) 0%, transparent 100%);
  background-attachment: fixed;
  transition: background-color .35s, color .35s;
}
main { max-width: 1000px; margin: 0 auto; padding: 22px 18px 70px; }

/* ── Header ───────────────────────────────────────────────── */
header {
  padding: 12px 28px;
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 50;
  box-shadow: inset 0 1px 0 var(--hi), 0 4px 20px rgba(0,0,0,0.12);
  transition: background .35s, border-color .35s;
}
.back-link { color: var(--accent); text-decoration: none; font-size: 0.84rem; font-weight: 500; transition: opacity .15s; }
.back-link:hover { opacity: 0.72; }
header h1 {
  font-size: 1.05rem; font-weight: 700;
  background: linear-gradient(120deg, var(--accent) 0%, var(--teal) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
#theme-toggle {
  margin-left: auto;
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 14px 6px 10px;
  cursor: pointer; font-family: inherit;
  font-size: 0.78rem; font-weight: 500; color: var(--sub);
  white-space: nowrap; transition: all .22s;
}
#theme-toggle:hover { background: var(--border); color: var(--text); }
.t-icon { font-size: 1rem; line-height: 1; }

/* ── Card ─────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 22px;
  margin-bottom: 16px;
  box-shadow: var(--card-shadow);
  transition: background .35s, border-color .35s;
}
.card-title {
  font-size: 0.67rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--muted); margin-bottom: 12px;
}

/* ── Buttons ──────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 10px;
  border: 1px solid transparent;
  font-family: inherit; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; text-decoration: none; white-space: nowrap;
  transition: all .18s;
}
.btn:hover  { filter: brightness(1.1); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); filter: none; }
.btn:disabled { opacity: .38; cursor: not-allowed; pointer-events: none; filter: none; transform: none; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,0.35);
}
.btn-next    { background: rgba(59,130,246,0.15);  color: #93c5fd; border-color: rgba(59,130,246,0.3); }
.btn-save    { background: rgba(16,185,129,0.15); color: var(--ok); border-color: rgba(16,185,129,0.3); }
.btn-teal    { background: rgba(20,184,166,0.15);  color: var(--teal); border-color: rgba(20,184,166,0.3); }
.btn-ghost   { background: var(--surface2); color: var(--text); border-color: var(--border); }
.btn-sm { padding: 6px 13px; font-size: 0.78rem; border-radius: 8px; }
.btn-xs {
  display: inline-flex; align-items: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--sub);
  padding: 3px 10px; font-size: 0.77rem; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.btn-xs:hover { background: var(--border); color: var(--text); }

/* ── Spinner ──────────────────────────────────────────────── */
.spin {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.2); border-top-color: currentColor;
  border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Badges ───────────────────────────────────────────────── */
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.71rem; font-weight: 600; }
.b-purple { background: var(--b-purple-bg); color: var(--b-purple-fg); }
.b-teal   { background: var(--b-teal-bg);   color: var(--b-teal-fg);   }
.b-blue   { background: var(--b-blue-bg);   color: var(--b-blue-fg);   }
.b-red    { background: var(--b-red-bg);    color: var(--b-red-fg);    }
.b-yellow { background: var(--b-yellow-bg); color: var(--b-yellow-fg); }
.b-gray   { background: var(--b-gray-bg);   color: var(--b-gray-fg);   }

/* ── Progress ─────────────────────────────────────────────── */
.prog-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar  { height: 100%; background: linear-gradient(90deg, var(--accent), var(--teal)); transition: width .3s; }
.prog-text { font-size: 0.74rem; color: var(--muted); margin-top: 6px; }
.log-box   {
  max-height: 180px; overflow-y: auto;
  font-size: 0.73rem; line-height: 1.85; margin-top: 10px;
  font-family: 'SF Mono','Fira Code',monospace; color: var(--muted);
}
.log-box .ok   { color: var(--ok); }
.log-box .warn { color: var(--warn); }
.log-box .err  { color: var(--danger); }

/* ── Phase display states ─────────────────────────────────── */
#detect-card   { }
#config-card   { display: none; }
#progress-card { display: none; }
#viewer        { display: none; }
#viewer.show   { display: block; }

/* ── Config ───────────────────────────────────────────────── */
.cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:500px){ .cfg-grid { grid-template-columns: 1fr; } }
.cfg-item label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
.cfg-input {
  width: 100%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px;
  padding: 9px 12px; font-size: 0.9rem; font-family: inherit;
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.cfg-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

/* ── Page map ─────────────────────────────────────────────── */
.range-strip { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 12px; }
.pg-dot {
  width: 28px; height: 28px; border-radius: 7px;
  font-size: 0.68rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border); cursor: default; transition: all .12s;
}
.pg-dot.queued  { background: var(--b-blue-bg);   color: var(--b-blue-fg);   border-color: rgba(59,130,246,0.3); }
.pg-dot.done    { background: var(--b-teal-bg);   color: var(--teal);        border-color: rgba(20,184,166,0.3); }
.pg-dot.active  { background: var(--accent); color: #fff; border-color: var(--accent); animation: pulse 1s ease infinite; }
.pg-dot.failed  { background: var(--b-red-bg);    color: var(--danger);      border-color: rgba(239,68,68,0.3); }
.pg-dot.more    { background: transparent; border: none; color: var(--muted); font-size: 0.9rem; }
.pg-dot.clickable { cursor: pointer; }
.pg-dot.clickable:hover { filter: brightness(1.3); transform: scale(1.1); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

/* ── Viewer controls ──────────────────────────────────────── */
.controls {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  padding: 10px 14px;
  background: var(--surface2);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px;
}
.ctrl-group { display: flex; align-items: center; gap: 6px; }
.ctrl-label { font-size: 0.73rem; color: var(--muted); font-weight: 500; }
.ctrl-select, .ctrl-input {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 7px;
  padding: 4px 9px; font-size: 0.8rem; font-family: inherit;
  outline: none; transition: border-color .2s;
}
.ctrl-select:focus, .ctrl-input:focus { border-color: var(--accent); }
.ctrl-input { width: 70px; }
.sep { width: 1px; height: 20px; background: var(--border); }

/* ── Pagination ───────────────────────────────────────────── */
.pagination { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.page-btn {
  padding: 5px 11px; border-radius: 7px; font-size: 0.8rem; font-weight: 600;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); cursor: pointer; font-family: inherit; transition: all .12s;
}
.page-btn:hover { background: var(--border); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:disabled { opacity: .32; cursor: not-allowed; }
.pg-info { font-size: 0.77rem; color: var(--muted); }

/* ── Post cards ───────────────────────────────────────────── */
.post-card {
  background: var(--surface);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border); border-radius: var(--r);
  margin-bottom: 10px; overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: box-shadow .2s, border-color .2s;
}
.post-card:hover { box-shadow: var(--card-shadow); }
.post-head {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 16px;
  background: var(--surface2); border-bottom: 1px solid var(--border);
}
.post-avatar    { width: 34px; height: 34px; border-radius: 8px; background: var(--border); object-fit: cover; flex-shrink: 0; }
.post-avatar-ph { width: 34px; height: 34px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .9rem; flex-shrink: 0; color: var(--muted); }
.post-author { font-weight: 600; font-size: 0.875rem; }
.post-role   { font-size: 0.7rem; color: var(--accent); margin-top: 1px; }
.post-date   { font-size: 0.7rem; color: var(--muted); }
.post-num    { margin-left: auto; font-family: monospace; font-size: 0.75rem; color: var(--muted); }
.post-wc     { font-size: 0.68rem; color: var(--muted); padding: 3px 16px 4px; border-bottom: 1px solid var(--border); }
.post-body   { padding: 12px 16px; font-size: 0.875rem; line-height: 1.8; color: var(--sub); white-space: pre-wrap; word-break: break-word; }
.post-source { padding: 2px 16px 10px; font-size: 0.68rem; color: var(--muted); }
.post-source a { color: var(--accent); text-decoration: none; }
.empty { text-align: center; padding: 36px; color: var(--muted); font-size: 0.88rem; }

/* ── Toast ────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--surface);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  color: var(--ok); border: 1px solid rgba(52,211,153,0.3);
  border-radius: 12px; padding: 11px 18px;
  font-size: 0.85rem; font-weight: 600;
  display: none; align-items: center; gap: 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
#toast.show { display: flex; }

/* ── Page capture modal ───────────────────────────────────── */
#page-modal {
  display: none; position: fixed; inset: 0; z-index: 100;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 16px;
}
#page-modal.open { display: flex; }
#modal-box {
  background: var(--surface);
  backdrop-filter: blur(30px) saturate(200%);
  -webkit-backdrop-filter: blur(30px) saturate(200%);
  border: 1px solid var(--border);
  border-radius: 18px; width: min(640px,100%); max-height: 82vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55), inset 0 1px 0 var(--hi);
}
#modal-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px; padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--surface2);
}
#modal-head h2 { font-size: 1rem; font-weight: 700; }
#modal-head p  { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
#modal-close {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--muted); cursor: pointer;
  font-size: 1rem; padding: 4px 9px; transition: all .15s; flex-shrink: 0;
}
#modal-close:hover { background: var(--border); color: var(--text); }
#modal-offset-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 22px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; font-size: 0.79rem; color: var(--muted);
  background: var(--surface2);
}
#modal-offset-bar input {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 7px;
  padding: 4px 9px; font-size: 0.79rem; font-family: inherit;
  width: 85px; outline: none; transition: border-color .2s;
}
#modal-offset-bar input:focus { border-color: var(--accent); }
#modal-scroll { overflow-y: auto; flex: 1; padding: 14px 22px; }
#modal-footer {
  padding: 12px 22px; border-top: 1px solid var(--border);
  flex-shrink: 0; display: none; background: var(--surface2);
}
#modal-footer.show { display: block; }

@media(max-width:600px){
  header { padding: 11px 14px; }
  main   { padding: 14px 11px 60px; }
  #theme-toggle .t-label { display: none; }
}
</style>
</head>
<body>
<script>(function(){const t=localStorage.getItem('smf-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>

<header>
  <div>
    <a class="back-link" href="/">← Back</a>
    <h1 style="margin-top:3px;">SMF Archiver — Scrape</h1>
  </div>
  <button id="theme-toggle" onclick="toggleTheme()">
    <span class="t-icon" id="theme-icon">☀</span>
    <span class="t-label" id="theme-label">Light</span>
  </button>
</header>

<main>

  <!-- Phase 1: Detecting pages -->
  <div class="card" id="detect-card">
    <div class="card-title">Detecting pagination for <strong id="hdr-date"></strong></div>
    <div style="display:flex;align-items:center;gap:10px;color:var(--muted);font-size:0.85rem;">
      <div class="spin" style="border-color:rgba(129,140,248,.25);border-top-color:var(--accent);width:16px;height:16px;"></div>
      <span id="detect-text">Fetching first page…</span>
    </div>
  </div>

  <!-- Phase 2: Config — shown after pages detected -->
  <div class="card" id="config-card">
    <div class="card-title">Configure scrape batch</div>

    <div style="margin-bottom:14px;">
      <div style="font-size:1rem;font-weight:700;" id="cfg-title">—</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;" id="cfg-badges"></div>
    </div>

    <!-- Visual page map -->
    <div style="font-size:0.68rem;color:var(--muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;">Page map</div>
    <div class="range-strip" id="page-map"></div>

    <div style="margin-top:18px;">
      <div class="cfg-grid">
        <div class="cfg-item">
          <label>Start from page</label>
          <input class="cfg-input" type="number" id="cfg-from" min="1" value="1">
        </div>
        <div class="cfg-item">
          <label>Number of pages to scrape</label>
          <input class="cfg-input" type="number" id="cfg-count" min="1" value="5">
        </div>
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <label style="font-size:0.75rem;color:var(--muted);font-weight:600;">Posts per page</label>
        <input class="cfg-input" type="number" id="cfg-ppp" min="1" value="15" style="width:72px;"
               title="Override if auto-detected page offsets are wrong"
               oninput="recalcOffsets()">
        <button class="btn-xs" onclick="recalcOffsets()" title="Set every offset = (page − 1) × PPP">Recalc all</button>
        <span id="ppp-hint" style="font-size:0.73rem;color:var(--muted);"></span>
      </div>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-primary" id="btn-start" onclick="startBatch()">
          🚀 Scrape pages
        </button>
        <span id="cfg-summary" style="font-size:0.81rem;color:var(--muted);"></span>
      </div>
    </div>
  </div>

  <!-- Phase 3: Progress -->
  <div class="card" id="progress-card">
    <div class="card-title">Scraping in progress</div>
    <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
    <div class="prog-text" id="prog-text">Starting…</div>
    <div class="log-box"   id="log"></div>
  </div>

  <!-- Phase 4: Thread viewer -->
  <div id="viewer">

    <div class="card" style="margin-bottom:16px;">
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;" id="v-title">—</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;" id="v-meta"></div>

      <!-- Action row -->
      <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px;align-items:center;">
        <button class="btn btn-save btn-sm" id="btn-save" onclick="saveData()">💾 Save</button>
        <button class="btn btn-next btn-sm" id="btn-next" onclick="scrapeNext()" style="display:none;">
          ⏭ Scrape next <span id="next-label">5</span> pages
        </button>
        <span id="next-count-wrap" style="display:none;align-items:center;gap:6px;font-size:0.78rem;color:var(--muted);">
          pages:
          <input type="number" id="next-count" min="1" value="5" style="width:55px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 7px;font-size:0.8rem;font-family:inherit;outline:none;" oninput="updateNextLabel()">
        </span>
        <button class="btn btn-ghost btn-sm" onclick="exportJSON()">⬇ JSON</button>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ CSV</button>
      </div>

      <!-- Filters -->
      <div class="controls">
        <div class="ctrl-group">
          <span class="ctrl-label">Posts/page</span>
          <select class="ctrl-select" id="ctrl-pagesize" onchange="applyFilters()">
            <option value="10">10</option>

<div id="toast">✓ Saved! <a id="toast-link" href="#" target="_blank" style="color:var(--ok);font-weight:800;">View →</a></div>

<script>
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('smf-theme', next);
  document.getElementById('theme-icon').textContent  = next === 'light' ? '☽' : '☀';
  document.getElementById('theme-label').textContent = next === 'light' ? 'Dark' : 'Light';
}
(function(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  const icon = document.getElementById('theme-icon');
  const lbl  = document.getElementById('theme-label');
  if (icon) icon.textContent = t === 'light' ? '☽' : '☀';
  if (lbl)  lbl.textContent  = t === 'light' ? 'Dark' : 'Light';
})();

// ── Injected from Flask ───────────────────────────────────
const TIMESTAMP  = {{ timestamp|tojson }};
const ORIGINAL   = {{ original|tojson }};
const DATE_HUMAN = {{ date_human|tojson }};

const $ = id => document.getElementById(id);
$('hdr-date').textContent = DATE_HUMAN;

// ── State ─────────────────────────────────────────────────
let _allOffsets   = [];
let _donePgs      = new Set();
let _nextIndex    = 0;
let _allPosts     = [];
let _filtered     = [];
let _curPage      = 1;
let _saveId       = null;
let _scraping     = false;
let _threadTitle  = '';
let _customPpp    = false;

// ══════════════════════════════════════════════════════════
//  Phase 1 — Detect pages
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', detectPages);

async function detectPages() {
  try {
    const resp = await fetch('/api/detect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ timestamp: TIMESTAMP, original: ORIGINAL })
    });
    const data = await resp.json();
    if (data.error) {
      $('detect-text').textContent = '❌ ' + data.error;
      return;
    }
    _allOffsets  = data.all_offsets;
    _threadTitle = data.title;
    showConfig(data);
  } catch (e) {
    $('detect-text').textContent = '❌ Network error: ' + e.message;
  }
}

function showConfig(data) {
  $('detect-card').style.display = 'none';
  $('config-card').style.display = 'block';

  $('cfg-title').textContent = data.title;
  document.title = data.title + ' — SMF Archiver';

  const badges = $('cfg-badges');
  badges.append(
    mkBadge(`${data.total_pages} pages detected`, 'b-purple'),
    mkBadge(`Captured ${DATE_HUMAN}`, 'b-gray'),
  );

  buildPageMap();

  if (_allOffsets.length >= 2) {
    const step = _allOffsets[1] - _allOffsets[0];
    $('cfg-ppp').value = step;
    $('ppp-hint').textContent = '(auto-detected)';
  } else {
    $('ppp-hint').textContent = '(default)';
  }

  $('cfg-count').max  = data.total_pages;
  $('cfg-from').max   = data.total_pages;
  $('cfg-count').value = Math.min(5, data.total_pages);
  updateCfgSummary();

  ['cfg-from','cfg-count'].forEach(id =>
    $(id).addEventListener('input', updateCfgSummary));
}

function buildPageMap(activePgs = new Set()) {
  const el  = $('page-map');
  el.innerHTML = '';
  const max = 50;
  const show = Math.min(_allOffsets.length, max);

  for (let i = 0; i < show; i++) {
    const div = document.createElement('div');
    div.className = 'pg-dot';
    div.title     = `Page ${i+1} (offset .${_allOffsets[i]}) — click to select capture`;
    div.textContent = i + 1;
    if (activePgs.has(i))     div.classList.add('active');
    else if (_donePgs.has(i)) div.classList.add('done');
    if (!activePgs.has(i)) {
      div.classList.add('clickable');
      div.onclick = () => openPageModal(i);
    }
    el.appendChild(div);
  }
  if (_allOffsets.length > max) {
    const m = document.createElement('div');
    m.className = 'pg-dot more';
    m.textContent = `+${_allOffsets.length - max}`;
    el.appendChild(m);
  }
}

function markPagesDone(fromIdx, count) {
  for (let i = fromIdx; i < fromIdx + count && i < _allOffsets.length; i++) {
    _donePgs.add(i);
  }
  buildPageMap();
}

function markPagesActive(fromIdx, count) {
  const active = new Set();
  for (let i = fromIdx; i < fromIdx + count && i < _allOffsets.length; i++) {
    active.add(i);
  }
  buildPageMap(active);
}

function updateCfgSummary() {
  const from  = Math.max(1, parseInt($('cfg-from').value) || 1);
  const count = Math.max(1, parseInt($('cfg-count').value) || 5);
  const to    = Math.min(from + count - 1, _allOffsets.length);
  $('cfg-summary').textContent =
    `Will scrape pages ${from} – ${to} of ${_allOffsets.length}`;
}

function recalcOffsets() {
  _customPpp = true;
  const ppp  = Math.max(1, parseInt($('cfg-ppp').value) || 15);
  const total = _allOffsets.length;
  $('ppp-hint').textContent = '(manual)';
  for (let i = 0; i < total; i++) _allOffsets[i] = i * ppp;
  buildPageMap();
  updateCfgSummary();
}

// ══════════════════════════════════════════════════════════
//  Phase 2 — Scrape a batch
// ══════════════════════════════════════════════════════════
async function startBatch() {
  const from  = Math.max(1, parseInt($('cfg-from').value) || 1) - 1;
  const count = Math.max(1, parseInt($('cfg-count').value) || 5);
  _nextIndex  = from;
  await runBatch(from, count);
}

async function scrapeNext() {
  const count = Math.max(1, parseInt($('next-count').value) || 5);
  await runBatch(_nextIndex, count);
}

async function runBatch(fromIndex, count) {
  if (_scraping) return;
  _scraping = true;

  $('config-card').style.display  = 'block';
  $('progress-card').style.display = 'block';
  $('btn-start').disabled = true;
  $('btn-next').disabled  = true;
  $('log').innerHTML = '';
  $('prog').style.width = '0%';

  markPagesActive(fromIndex, count);

  const addLog = (msg, cls='') => {
    $('log').innerHTML += `<div class="${cls}">${esc(msg)}</div>`;
    $('log').scrollTop = $('log').scrollHeight;
  };

  addLog(`Starting batch: pages ${fromIndex+1} – ${Math.min(fromIndex+count, _allOffsets.length)} of ${_allOffsets.length}…`);

  try {
    const resp = await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        timestamp:   TIMESTAMP,
        original:    ORIGINAL,
        all_offsets: _allOffsets,
        from_index:  fromIndex,
        count:       count,
      })
    });

    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const { event, data } = parseSSE(part);
        if (!data) continue;

        if (event === 'status' || event === 'batch_start') {
          if (data.msg) { $('prog-text').textContent = data.msg; addLog(data.msg); }
        }
        else if (event === 'page_progress') {
          const pct = Math.round((data.index / data.total) * 100);
          $('prog').style.width = pct + '%';
          $('prog-text').textContent = data.msg;
          const cls = data.failed ? 'warn' : 'ok';
          const extra = data.posts_found != null ? ` — ${data.posts_found} posts` : '';
          addLog(data.msg + extra, cls);
        }
        else if (event === 'offsets_updated') {
          const newOffsets = data.all_offsets;
          if (!_customPpp && newOffsets.length > _allOffsets.length) {
            _allOffsets.length = 0;
            newOffsets.forEach(o => _allOffsets.push(o));
            $('cfg-count').max = _allOffsets.length;
            $('cfg-from').max  = _allOffsets.length;
            updateCfgSummary();
            addLog(data.msg, 'ok');
            markPagesActive(fromIndex, count);
          }
        }
        else if (event === 'error') {
          addLog('❌ ' + data.msg, 'err');
          $('prog-text').textContent = 'Failed.';
        }
        else if (event === 'done') {
          $('prog').style.width = '100%';
          $('prog-text').textContent =
            `✓ Batch done — ${data.total_posts} new posts from ${data.batch_pages} pages`;
          addLog(`✓ ${data.total_posts} posts collected, ${data.unique_authors} authors`, 'ok');

          const existingIds = new Set(_allPosts.map(p => p.post_id));
          const added = data.posts.filter(p => !existingIds.has(p.post_id));
          _allPosts.push(...added);
          _allPosts.sort((a,b) => a.global_post_num - b.global_post_num);

          if (data.title && !_threadTitle) _threadTitle = data.title;
          _nextIndex = data.next_index;

          if (!_customPpp && data.all_offsets && data.all_offsets.length > _allOffsets.length) {
            _allOffsets.length = 0;
            data.all_offsets.forEach(o => _allOffsets.push(o));
            $('cfg-count').max = _allOffsets.length;
            $('cfg-from').max  = _allOffsets.length;
            updateCfgSummary();
          }

          markPagesDone(fromIndex, count);

          if (_saveId) {
            await appendToSave(added, data);
          }

          renderViewer(data);

          if (data.has_more) {
            $('btn-next').style.display = 'inline-flex';
            $('next-count-wrap').style.display = 'inline-flex';
            $('next-count').value = count;
            updateNextLabel();
            addLog(`📄 ${_allOffsets.length - _nextIndex} of ${_allOffsets.length} pages remaining`, '');
          } else {
            $('btn-next').style.display = 'none';
            $('next-count-wrap').style.display = 'none';
            addLog('✅ All pages scraped!', 'ok');
          }
        }
      }
    }
  } catch (e) {
    addLog('Network error: ' + e.message, 'err');
  }

  _scraping = false;
  $('btn-start').disabled = false;
  $('btn-next').disabled  = false;
}

function parseSSE(raw) {
  let event = 'message', dataStr = '';
  for (const line of raw.split('\n')) {
    if (line.startsWith('event:')) event   = line.slice(6).trim();
    if (line.startsWith('data:'))  dataStr = line.slice(5).trim();
  }
  try { return { event, data: dataStr ? JSON.parse(dataStr) : null }; }
  catch { return { event, data: null }; }
}

function updateNextLabel() {
  const n = Math.max(1, parseInt($('next-count').value) || 5);
  $('next-label').textContent = n;
}

// ══════════════════════════════════════════════════════════
//  Thread viewer
// ══════════════════════════════════════════════════════════
function renderViewer(result) {
  document.title = _threadTitle + ' — SMF Archiver';
  $('v-title').textContent = _threadTitle;

  const meta = $('v-meta');
  meta.innerHTML = '';
  const pagesScraped = _nextIndex;
  const hasMore = _nextIndex < _allOffsets.length;
  meta.append(
    mkBadge(`${_allPosts.length} posts`, 'b-teal'),
    mkBadge(`${pagesScraped}/${_allOffsets.length} pages scraped`, hasMore ? 'b-yellow' : 'b-purple'),
    mkBadge(`${new Set(_allPosts.map(p=>p.author)).size} authors`, 'b-gray'),
    result.failed_pages ? mkBadge(`${result.failed_pages} failed`, 'b-red') : '',
    mkBadge(`Captured ${DATE_HUMAN}`, 'b-gray'),
  );

  const authors = [...new Set(_allPosts.map(p => p.author))].sort();
  const sel = $('ctrl-author');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All authors</option>';
  authors.forEach(a => {
    const o = document.createElement('option');
    o.value = a; o.textContent = a; sel.appendChild(o);
  });
  sel.value = prev;

  $('viewer').classList.add('show');
  applyFilters();
}

// ══════════════════════════════════════════════════════════
//  Filters & pagination
// ══════════════════════════════════════════════════════════
function applyFilters() {
  const author     = $('ctrl-author').value;
  const minSel     = $('ctrl-minwords').value;
  const customIn   = $('ctrl-custom-words');
  customIn.style.display = minSel === 'custom' ? 'inline-block' : 'none';
  const minWords   = minSel === 'custom' ? (parseInt(customIn.value)||0) : parseInt(minSel)||0;
  const hideQuotes = $('ctrl-quotes').value === 'hide';

  _filtered = _allPosts.filter(p => {
    if (author && p.author !== author) return false;
    if ((p.word_count||0) < minWords)  return false;
    if (hideQuotes && /quote\s+from:/i.test(p.content)) return false;
    return true;
  });
  _curPage = 1;
  renderPage();
}

function renderPage() {
  const pageSize = parseInt($('ctrl-pagesize').value) || 15;
  const total    = Math.max(1, Math.ceil(_filtered.length / pageSize));
  if (_curPage > total) _curPage = total;
  const start = (_curPage-1)*pageSize;
  const slice = _filtered.slice(start, start+pageSize);

  $('pg-info').textContent =
    `Showing ${start+1}–${Math.min(start+pageSize,_filtered.length)} of ${_filtered.length} posts`;

  renderPag('pag-top',    total, pageSize);
  renderPag('pag-bottom', total, pageSize);

  const c = $('posts');
  c.innerHTML = '';
  if (!slice.length) { c.innerHTML='<div class="empty">No posts match the current filters.</div>'; return; }

  for (const p of slice) {
    const av = p.avatar_url
      ? `<img class="post-avatar" src="${esc(p.avatar_url)}" alt="" onerror="this.style.display='none'">`
      : `<div class="post-avatar-ph">👤</div>`;
    c.innerHTML += `
      <div class="post-card">
        <div class="post-head">
          ${av}
          <div style="flex:1;min-width:0;">
            <div class="post-author">${esc(p.author)}</div>
            ${p.author_role?`<div class="post-role">${esc(p.author_role)}</div>`:''}
            <div class="post-date">${esc(p.date_raw)}</div>
          </div>
          <div class="post-num">#${p.global_post_num}</div>
        </div>
        <div class="post-wc">${p.word_count||0} words</div>
        <div class="post-body">${esc(p.content)}</div>
        ${p.source_url?`<div class="post-source">📦 <a href="${esc(p.source_url)}" target="_blank">${esc(p.source_url.slice(0,70))}…</a></div>`:''}
      </div>`;
  }
}

function renderPag(elId, total, pageSize) {
  const el = $(elId);
  el.innerHTML = '';
  if (total <= 1) return;
  const mk = (lbl,pg,active,dis) => {
    const b = document.createElement('button');
    b.className = 'page-btn'+(active?' active':'');
    b.textContent=lbl; b.disabled=dis;
    if(!dis) b.onclick=()=>{ _curPage=pg; renderPage(); window.scrollTo({top:0,behavior:'smooth'}); };
    return b;
  };
  el.appendChild(mk('«',1,false,_curPage===1));
  el.appendChild(mk('‹',_curPage-1,false,_curPage===1));
  const lo=Math.max(1,_curPage-2), hi=Math.min(total,_curPage+2);
  if(lo>1) el.appendChild(Object.assign(document.createElement('span'),{className:'pg-info',textContent:'…'}));
  for(let p=lo;p<=hi;p++) el.appendChild(mk(p,p,p===_curPage,p===_curPage));
  if(hi<total) el.appendChild(Object.assign(document.createElement('span'),{className:'pg-info',textContent:'…'}));
  el.appendChild(mk('›',_curPage+1,false,_curPage===total));
  el.appendChild(mk('»',total,false,_curPage===total));
}

// ══════════════════════════════════════════════════════════
//  Save / Append
// ══════════════════════════════════════════════════════════
async function saveData() {
  if (!_allPosts.length) return;
  const btn = $('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Saving…';

  try {
    const payload = {
      title:          _threadTitle,
      timestamp:      TIMESTAMP,
      date_human:     DATE_HUMAN,
      original:       ORIGINAL,
      pages_scraped:  _nextIndex,
      total_pages:    _allOffsets.length,
      all_offsets:    _allOffsets,
      unique_authors: new Set(_allPosts.map(p=>p.author)).size,
      posts:          _allPosts,
    };

    let resp, data;
    if (_saveId) {
      resp = await fetch(`/api/saved/${_saveId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          posts:         _allPosts,
          pages_scraped: _nextIndex,
          total_pages:   _allOffsets.length,
          all_offsets:   _allOffsets,
        })
      });
      data = await resp.json();
      if (data.ok) {
        btn.innerHTML = '💾 Saved';
        showToast(`/view/${_saveId}`);
      }
    } else {
      resp = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      data = await resp.json();
      if (data.id) {
        _saveId = data.id;
        btn.innerHTML = '💾 Saved';
        showToast(data.url);
      }
    }

    if (!data.id && !data.ok) {
      btn.innerHTML = '💾 Save';
      btn.disabled  = false;
      alert('Save failed: ' + (data.error || 'unknown'));
    }
  } catch (e) {
    btn.innerHTML = '💾 Save';
    btn.disabled  = false;
    alert('Network error: ' + e.message);
  }
}

async function appendToSave(newPosts, batchResult, replaceOffset = null) {
  if (!_saveId || !newPosts.length) return false;
  try {
    const payload = {
      posts:         newPosts,
      pages_scraped: _nextIndex,
      total_pages:   _allOffsets.length,
      all_offsets:   _allOffsets,
    };
    if (replaceOffset !== null) payload.replace_offset = replaceOffset;
    const resp = await fetch(`/api/saved/${_saveId}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    const result = await resp.json();
    return result.ok === true;
  } catch (_) {
    return false;
  }
}

function showToast(url) {
  $('toast-link').href = url;
  const t = $('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 5000);
}

// ══════════════════════════════════════════════════════════
//  Export
// ══════════════════════════════════════════════════════════
function exportJSON() {
  if (!_allPosts.length) return;
  dl(new Blob([JSON.stringify(_allPosts,null,2)],{type:'application/json'}),'posts.json');
}
function exportCSV() {
  if (!_allPosts.length) return;
  const cols=['global_post_num','post_id','author','author_role','date_raw','word_count','content','source_url'];
  const rows=[cols.join(',')];
  for(const p of _allPosts)
    rows.push(cols.map(c=>`"${String(p[c]||'').replace(/"/g,'""')}"`).join(','));
  dl(new Blob([rows.join('\n')],{type:'text/csv'}),'posts.csv');
}
function dl(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }

// ══════════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════════
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function mkBadge(txt,cls){
  if(!txt) return '';
  const s=document.createElement('span');
  s.className=`badge ${cls}`; s.textContent=txt; return s;
}

$('ctrl-minwords').addEventListener('change', function(){
  $('ctrl-custom-words').style.display = this.value==='custom' ? 'inline-block' : 'none';
  applyFilters();
});
['ctrl-pagesize','ctrl-author'].forEach(id =>
  $(id).addEventListener('change', () => { _curPage=1; renderPage(); }));

// ══════════════════════════════════════════════════════════
//  Page capture modal
// ══════════════════════════════════════════════════════════
let _modalPageIdx  = null;
let _modalOffset   = null;
let _modalScraping = false;

function openPageModal(idx) {
  if (_scraping) return;
  _modalPageIdx = idx;
  _modalOffset  = _allOffsets[idx];

  $('modal-title').textContent    = `Page ${idx + 1} — offset .${_modalOffset}`;
  $('modal-subtitle').textContent = 'Loading available captures…';
  $('modal-offset-input').value   = _modalOffset;
  $('modal-offset-hint').textContent = '';
  $('modal-captures').innerHTML   = '<div class="spin" style="width:18px;height:18px;margin:20px auto;display:block;border-color:rgba(129,140,248,.25);border-top-color:var(--accent);"></div>';
  $('modal-footer').classList.remove('show');
  $('modal-prog-bar').style.width  = '0%';
  $('modal-prog-text').textContent = '';
  $('modal-log').innerHTML = '';
  $('modal-close').disabled = false;
  $('page-modal').classList.add('open');

  loadPageCaptures();
}

function closePageModal() {
  if (_modalScraping) return;
  $('page-modal').classList.remove('open');
}

async function loadPageCaptures() {
  try {
    const resp = await fetch('/api/captures_for_page', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ original: ORIGINAL, offset: _modalOffset }),
    });
    const data = await resp.json();
    if (data.error) {
      $('modal-captures').innerHTML   = `<div style="color:var(--danger);padding:10px 0;">${esc(data.error)}</div>`;
      $('modal-subtitle').textContent = 'No captures found';
      return;
    }
    renderModalCaptures(data.captures);
  } catch(e) {
    $('modal-captures').innerHTML = `<div style="color:var(--danger);padding:10px 0;">Error: ${esc(e.message)}</div>`;
  }
}

function autoModalOffset() {
  const ppp  = Math.max(1, parseInt($('cfg-ppp').value) || 15);
  const calc = _modalPageIdx * ppp;
  $('modal-offset-input').value = calc;
  $('modal-offset-hint').textContent = `= ${_modalPageIdx + 1} × ${ppp} − ${ppp}`;
}

function applyModalOffset() {
  const val = parseInt($('modal-offset-input').value);
  if (isNaN(val) || val < 0) return;
  _modalOffset = val;
  _allOffsets[_modalPageIdx] = val;
  _customPpp = true;
  $('modal-title').textContent    = `Page ${_modalPageIdx + 1} — offset .${_modalOffset}`;
  $('modal-offset-hint').textContent = '✓ Updated — reloading captures…';
  $('modal-subtitle').textContent = 'Loading available captures…';
  $('modal-captures').innerHTML   = '<div class="spin" style="width:18px;height:18px;margin:20px auto;display:block;border-color:rgba(129,140,248,.25);border-top-color:var(--accent);"></div>';
  $('modal-footer').classList.remove('show');
  buildPageMap();
  loadPageCaptures();
}

function renderModalCaptures(captures) {
  $('modal-subtitle').textContent =
    `${captures.length} capture${captures.length !== 1 ? 's' : ''} found — pick one to reload this page`;
  if (!captures.length) {
    $('modal-captures').innerHTML = '<div class="empty">No captures found for this page offset.</div>';
    return;
  }
  let html = `<table style="width:100%;border-collapse:collapse;font-size:0.83rem;">
    <thead><tr>
      <th style="text-align:left;padding:7px 10px;color:var(--muted);font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.9px;border-bottom:1px solid var(--border);">#</th>
      <th style="text-align:left;padding:7px 10px;color:var(--muted);font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.9px;border-bottom:1px solid var(--border);">Date</th>
      <th style="padding:7px 10px;border-bottom:1px solid var(--border);"></th>
    </tr></thead><tbody>`;
  captures.forEach((cap, i) => {
    html += `<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:9px 10px;color:var(--muted);font-size:0.77rem;">${i + 1}</td>
      <td style="padding:9px 10px;">
        <strong>${esc(cap.date_human)}</strong>
        <div style="font-size:0.69rem;color:var(--muted);margin-top:2px;font-family:monospace;">${cap.timestamp}</div>
      </td>
      <td style="padding:9px 10px;text-align:right;white-space:nowrap;">
        <a href="${esc(cap.wayback_url)}" target="_blank"
           style="color:var(--accent);font-size:0.74rem;text-decoration:none;margin-right:10px;"
           title="Preview in Wayback Machine">🔗</a>
        <button class="btn btn-teal btn-sm modal-use-btn"
                onclick="selectCapture('${esc(cap.timestamp)}')">Use this</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  $('modal-captures').innerHTML = html;
}

async function selectCapture(timestamp) {
  if (_modalScraping) return;
  _modalScraping = true;

  document.querySelectorAll('.modal-use-btn').forEach(b => b.disabled = true);
  $('modal-close').disabled = true;
  $('modal-footer').classList.add('show');
  $('modal-prog-bar').style.width  = '0%';
  $('modal-prog-text').textContent = 'Starting…';
  $('modal-log').innerHTML = '';

  const addLog = (msg, cls='') => {
    $('modal-log').innerHTML += `<div class="${cls}">${esc(msg)}</div>`;
    $('modal-log').scrollTop = $('modal-log').scrollHeight;
  };

  try {
    const resp = await fetch('/api/scrape_page', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ timestamp, original: ORIGINAL, offset: _modalOffset }),
    });

    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const { event, data } = parseSSE(part);
        if (!data) continue;

        if (event === 'status') {
          $('modal-prog-bar').style.width  = '40%';
          $('modal-prog-text').textContent = data.msg;
          addLog(data.msg);
        } else if (event === 'error') {
          $('modal-prog-bar').style.width  = '100%';
          $('modal-prog-text').textContent = '❌ ' + data.msg;
          addLog('❌ ' + data.msg, 'err');
          document.querySelectorAll('.modal-use-btn').forEach(b => b.disabled = false);
          $('modal-close').disabled = false;
          _modalScraping = false;
          return;
        } else if (event === 'done') {
          $('modal-prog-bar').style.width  = '100%';
          $('modal-prog-text').textContent = `✓ ${data.post_count} posts from ${data.date_human}`;
          addLog(`✓ ${data.post_count} posts`, 'ok');

          if (data.found_offsets && data.found_offsets.length) {
            const existingSet = new Set(_allOffsets);
            const newOnes = data.found_offsets.filter(o => !existingSet.has(o));
            if (newOnes.length > 0) {
              const merged = [...existingSet, ...newOnes].sort((a,b) => a - b);
              _allOffsets = merged;
              $('cfg-count').max = _allOffsets.length;
              $('cfg-from').max  = _allOffsets.length;
              updateCfgSummary();
              addLog(`📄 Found ${newOnes.length} new page(s) — total now ${_allOffsets.length}`, 'ok');
            }
          }

          _allPosts = _allPosts.filter(p => p.page_offset !== _modalOffset);
          _allPosts.push(...data.posts);
          _allPosts.sort((a,b) => a.global_post_num - b.global_post_num);

          _donePgs.add(_modalPageIdx);
          buildPageMap();

          if (_saveId) {
            const saved = await appendToSave(data.posts, null, _modalOffset);
            addLog(saved ? '💾 Save updated' : '⚠ Save update failed — click Save to retry', saved ? 'ok' : 'warn');
          }

          applyFilters();

          setTimeout(() => {
            $('modal-close').disabled = false;
            _modalScraping = false;
            closePageModal();
          }, 1400);
        }
      }
    }
  } catch(e) {
    addLog('Network error: ' + e.message, 'err');
    $('modal-prog-text').textContent = 'Failed.';
    document.querySelectorAll('.modal-use-btn').forEach(b => b.disabled = false);
    $('modal-close').disabled = false;
    _modalScraping = false;
  }
}
</script>
</body>
</html>
